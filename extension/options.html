<!DOCTYPE html>
<html>

<head>
    <title>JobNova Options</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            width: 400px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
        }

        button {
            padding: 8px 16px;
            background: #0a66c2;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #004182;
        }

        .status {
            margin-top: 10px;
            color: green;
            display: none;
        }
    </style>
</head>

<body>
    <h2>JobNova Settings</h2>

    <label for="apiKey">Review your API Key:</label>
    <input type="password" id="apiKey" placeholder="Paste your API Key here">

    <button id="save">Save</button>
    <div id="status" class="status">Saved!</div>

    <script src="options.js"></script>
</body>

</html>
