version: '3.8'

# Production compose example (use with care; secrets via env or secrets mgr)
# Not for local dev - use docker-compose.yml + .env
# Images should be prebuilt, no code volume mounts, proper scaling, etc.

services:
  postgres:
    image: pgvector/pgvector:0.7.4-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reboundiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-example-prod-pass-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-reboundiq}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # no port expose in prod typically, use internal net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reboundiq} -d ${POSTGRES_DB:-reboundiq}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  # ollama in prod: often separate GPU host or vLLM service
  # minio or real S3

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    # image: yourreg/reboundiq-api:latest  # for prod deploy
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - AI_CHAT_MODEL=${AI_CHAT_MODEL}
      - AI_EMBEDDING_MODEL=${AI_EMBEDDING_MODEL}
      - AI_BASE_URL=${AI_BASE_URL}
      - ENABLE_EXTERNAL_AI=${ENABLE_EXTERNAL_AI:-false}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-s3}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # no code volume; use built image layers
    # command from Dockerfile or override for gunicorn etc
    restart: unless-stopped

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    # image: ...
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    # image: yourreg/reboundiq-web:latest
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://api:8000}
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
